<!doctype html>
<!--
  Source template for public/og.png (1200x630). Not shipped to production —
  screenshot it at exactly 1200x630 and save over public/og.png whenever the
  card needs to change. Uses the shipped font files so the render matches the
  site. Copy is timeless on purpose: no day counts that go stale.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      @font-face {
        font-family: 'Bricolage Grotesque Variable';
        font-style: normal;
        font-weight: 200 800;
        src: url('fonts/bricolage-grotesque-latin.woff2') format('woff2-variations');
      }
      @font-face {
        font-family: 'IBM Plex Mono';
        font-style: normal;
        font-weight: 500;
        src: url('fonts/ibm-plex-mono-latin-500.woff2') format('woff2');
      }
      * { box-sizing: border-box; margin: 0; }
      html, body { width: 1200px; height: 630px; overflow: hidden; }
      body {
        --paper: #edf2e7;
        --rule: #c7d6c2;
        --ink: #1b2620;
        --ink-muted: #55645b;
        --red: #bf3b2f;
        --green: #2f5c45;
        background: var(--paper);
        color: var(--ink);
        font-family: 'Bricolage Grotesque Variable', sans-serif;
        position: relative;
      }
      /* ruled ledger paper */
      .lines {
        position: absolute;
        inset: 0;
        background-image: repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent 51px,
          var(--rule) 51px,
          var(--rule) 52px
        );
        opacity: 0.55;
      }
      /* the signature red margin: a classic double line */
      .margin {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 88px;
        width: 5px;
        border-left: 2px solid var(--red);
        border-right: 2px solid var(--red);
        opacity: 0.75;
      }
      .content {
        position: absolute;
        left: 140px;
        top: 78px;
        right: 60px;
      }
      .eyebrow {
        font-family: 'IBM Plex Mono', monospace;
        font-weight: 500;
        font-size: 22px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--ink-muted);
        white-space: nowrap;
      }
      h1 {
        margin-top: 24px;
        font-weight: 750;
        font-size: 112px;
        line-height: 1.06;
        letter-spacing: -0.015em;
        white-space: nowrap;
      }
      h1 .arrow { color: var(--red); }
      h1 .sub { color: var(--ink-muted); font-weight: 600; }
      .stamp {
        display: inline-block;
        margin-top: 44px;
        transform: rotate(-1.6deg);
        border: 3px solid var(--red);
        outline: 2px solid var(--red);
        outline-offset: 3px;
        padding: 16px 26px;
        font-family: 'IBM Plex Mono', monospace;
        font-weight: 500;
        font-size: 24px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--red);
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="lines"></div>
    <div class="margin"></div>
    <div class="content">
      <p class="eyebrow">A public ledger — real numbers every Sunday</p>
      <h1>
        $0 <span class="arrow">→</span> $100k<br />
        <span class="sub">by Dec 31, 2026.</span>
      </h1>
      <p><span class="stamp">$100/mo budget · $0 ads · every number public</span></p>
    </div>
  </body>
</html>
