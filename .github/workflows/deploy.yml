name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: `npm run leaks -- --git` scans every commit message,
          # and a shallow clone would let it pass without seeing most of them.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      # Leak guard, before the build: sources + commit messages. The terms come
      # from a repository secret, never from the tree — a committed denylist, even
      # hashed, was recoverable. No secret means a red build, never a silent pass.
      - run: npm run leaks -- --git
        env:
          LEAK_DENYLIST: ${{ secrets.LEAK_DENYLIST }}
      - run: npm run build
      # And again on the generated output, which is what actually ships.
      - run: npm run leaks -- --dist
        env:
          LEAK_DENYLIST: ${{ secrets.LEAK_DENYLIST }}
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
